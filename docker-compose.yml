services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - matrix-net

  php:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    networks:
      - matrix-net

  mariadb:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: matrix_os
      MYSQL_USER: matrix
      MYSQL_PASSWORD: matrix_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - matrix-net

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - matrix-net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: matrix
      RABBITMQ_DEFAULT_PASS: matrix_password
    networks:
      - matrix-net

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    networks:
      - matrix-net

  websocket:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    command: php /var/www/backend/bin/websocket-server.php
    ports:
      - "8081:8081"
    networks:
      - matrix-net

  worker:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    command: php /var/www/backend/bin/matrix-worker.php
    depends_on:
      - rabbitmq
    networks:
      - matrix-net

volumes:
  db_data:

networks:
  matrix-net:
    driver: bridge
